<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ──
let currentUser = null;
let currentProfile = null;
let myCount = 0;
let currentDhikr = 'سُبْحَانَ اللهِ';
let lbRefreshTimer = null;
let saveDebounce = null;
let realtimeChannel = null;

const ADHKAR = [
  'سُبْحَانَ اللهِ',
  'الْحَمْدُ لِلَّهِ',
  'اللهُ أَكْبَرُ',
  'لَا إِلَهَ إِلَّا اللهُ',
  'أَسْتَغْفِرُ اللهَ',
  'سُبْحَانَ اللهِ وَبِحَمْدِهِ',
];

// ── Helpers ──
function toAr(n) { return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function rankLabel(n) {
  if (n === 1) return '🥇 المركز الأول';
  if (n === 2) return '🥈 المركز الثاني';
  if (n === 3) return '🥉 المركز الثالث';
  return `المركز ${toAr(n)}`;
}

// ── Init ──
async function init() {
  // امسح أي hash في الـ URL بعد الـ OAuth redirect بدون ما تعمل reload
  if (window.location.hash && window.location.hash.includes('access_token')) {
    history.replaceState(null, '', window.location.pathname);
  }

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    await onLogin(session.user);
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await onLogin(session.user);
    } else if (event === 'SIGNED_OUT') {
      onLogout();
    }
  });
}

// ── Google Login ──
document.getElementById('googleLoginBtn').onclick = async () => {
  // Sign out أي session قديمة أولاً
  await db.auth.signOut();

  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://qurankaream.netlify.app/competition',
      queryParams: {
        prompt: 'select_account' // ← يعرض قائمة اختيار الحساب دايماً
      }
    }
  });
  if (error) showToast('حدث خطأ: ' + error.message);
};

// ── On Login ──
async function onLogin(user) {
  // لو نفس اليوزر دخل تاني ما نعملش حاجة
  if (currentUser && currentUser.id === user.id) return;

  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userAvatar').style.display = 'block';
  document.getElementById('settingsBtn').style.display = 'flex';

  await loadProfile(user);
  buildDhikrOptions();
  await loadMyScore();
  await loadLeaderboard();
  startLbAutoRefresh();
  subscribeRealtime();
}

async function loadProfile(user) {
  let { data: profileArr } = await db
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .limit(1);
  let profile = (profileArr && profileArr.length > 0) ? profileArr[0] : null;

  if (!profile) {
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'مجهول';
    const avatar = user.user_metadata?.avatar_url || '';
    const { data: newProfile } = await db
      .from('profiles')
      .insert({ id: user.id, display_name: name, avatar_url: avatar })
      .select()
      .single();
    profile = newProfile || { id: user.id, display_name: name, avatar_url: avatar };
  }

  currentProfile = profile;
  updateProfileUI(profile);
}

function updateProfileUI(profile) {
  const avatar = profile.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.display_name)}&background=8b6914&color=fdf6e3`;
  document.getElementById('userAvatar').src = avatar;
  document.getElementById('myAvatar').src = avatar;
  document.getElementById('myName').textContent = profile.display_name;
  document.getElementById('modalAvatar').src = avatar;
  document.getElementById('displayNameInput').value = profile.display_name;
}

// ── On Logout ──
function onLogout() {
  currentUser = null;
  currentProfile = null;
  myCount = 0;
  clearInterval(lbRefreshTimer);
  if (realtimeChannel) { db.removeChannel(realtimeChannel); realtimeChannel = null; }
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('userAvatar').style.display = 'none';
  document.getElementById('settingsBtn').style.display = 'none';
  document.getElementById('myCountDisplay').textContent = '٠';
  document.getElementById('myRankText').textContent = 'ترتيبك: —';
}

// ── Dhikr Options ──
function buildDhikrOptions() {
  const container = document.getElementById('dhikrOptions');
  container.innerHTML = '';
  ADHKAR.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dhikr-opt' + (d === currentDhikr ? ' active' : '');
    el.textContent = d;
    el.onclick = () => selectDhikr(d);
    container.appendChild(el);
  });
}

async function selectDhikr(d) {
  // حفظ الـ pending قبل التغيير
  if (saveDebounce) { clearTimeout(saveDebounce); await saveScore(); }

  currentDhikr = d;
  document.querySelectorAll('.dhikr-opt').forEach(el => el.classList.toggle('active', el.textContent === d));

  // تحديث نص الزر
  const btn = document.getElementById('tasbihBtn');
  btn.innerHTML = `${d}<br><span class="tasbih-btn-sub">اضغط للتسبيح ← Space</span>`;

  // إعادة تحميل العداد الخاص بالذكر الجديد
  await loadMyScore();
  await loadLeaderboard();
}

// ── Load My Score ──
async function loadMyScore() {
  if (!currentUser) return;

  const { data } = await db
    .from('tasbih_scores')
    .select('count')
    .eq('user_id', currentUser.id)
    .eq('dhikr', currentDhikr)
    .limit(1); // ✅ بدل maybeSingle اللي بترمي 406

  myCount = (data && data.length > 0) ? (data[0].count ?? 0) : 0;
  document.getElementById('myCountDisplay').textContent = toAr(myCount);
}

// ── Tick / Count ──
document.getElementById('tasbihBtn').onclick = tick;
document.getElementById('undoBtn').onclick = undoTick;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tick(); }
});

function tick() {
  if (!currentUser) return;
  myCount++;
  document.getElementById('myCountDisplay').textContent = toAr(myCount);

  const btn = document.getElementById('tasbihBtn');
  btn.classList.remove('pulse');
  void btn.offsetWidth;
  btn.classList.add('pulse');
  if (navigator.vibrate) navigator.vibrate(25);

  scheduleSave();
}

function undoTick() {
  if (!currentUser || myCount <= 0) return;
  myCount--;
  document.getElementById('myCountDisplay').textContent = toAr(myCount);
  scheduleSave();
}

function scheduleSave() {
  if (saveDebounce) clearTimeout(saveDebounce);
  saveDebounce = setTimeout(saveScore, 1200);
}

// ✅ الدالة الصح - بتعمل upsert بالـ user_id والـ dhikr كـ conflict key
async function saveScore() {
  if (!currentUser) return;
  saveDebounce = null;

  const { error } = await db.from('tasbih_scores').upsert(
    {
      user_id: currentUser.id,
      dhikr: currentDhikr,
      count: myCount,
      updated_at: new Date().toISOString()
    },
    { onConflict: 'user_id,dhikr' } // ✅ الـ unique constraint اللي عملته في Supabase
  );

  if (error) {
    console.error('Save error:', error);
  } else {
    // ✅ نعمل refresh بعد الحفظ علشان اللوحة تتحدث
    await loadLeaderboard();
  }
}

// ── Leaderboard ──
// ✅ الحل الصح - بنجيب user_id من الـ tasbih_scores مش من الـ profiles
async function loadLeaderboard() {
  const lb = document.getElementById('leaderboard');

  const { data, error } = await db
    .from('tasbih_scores')
    .select(`
      user_id,
      count,
      profiles (
        display_name,
        avatar_url
      )
    `)
    .eq('dhikr', currentDhikr)
    .order('count', { ascending: false })
    .limit(20);

  if (error || !data) {
    lb.innerHTML = '<div class="lb-empty">تعذر تحميل الترتيب</div>';
    return;
  }

  if (data.length === 0) {
    lb.innerHTML = '<div class="lb-empty">لا يوجد مشاركون بعد — كن الأول! 🌟</div>';
    return;
  }

  lb.innerHTML = '';
  let myRank = null;

  data.forEach((row, i) => {
    const rank = i + 1;
    const profile = row.profiles;
    const name = profile?.display_name || 'مجهول';
    const avatar = profile?.avatar_url ||
      `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8b6914&color=fdf6e3`;

    // ✅ المقارنة الصحيحة الوحيدة - بالـ user_id مش بالاسم أو العدد
    const isMe = currentUser && row.user_id === currentUser.id;
    if (isMe) {
      myRank = rank;
      // ✅ تحديث الـ myCount من اللوحة علشان يكون محدث دايماً
      if (row.count !== myCount && saveDebounce === null) {
        myCount = row.count;
        document.getElementById('myCountDisplay').textContent = toAr(myCount);
      }
    }

    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : toAr(rank);

    const item = document.createElement('div');
    item.className = `lb-item ${rankClass} ${isMe ? 'me' : ''}`;
    item.style.animationDelay = (i * 0.06) + 's';
    item.innerHTML = `
      ${isMe ? '<span class="lb-me-badge">أنت</span>' : ''}
      <span class="lb-rank">${rankEmoji}</span>
      <img class="lb-avatar" src="${avatar}" alt=""
           onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8b6914&color=fdf6e3'">
      <div class="lb-info">
        <span class="lb-name">${name}</span>
        <span class="lb-dhikr">${currentDhikr}</span>
      </div>
      <div style="text-align:center">
        <div class="lb-count">${toAr(row.count)}</div>
        <span class="lb-count-label">تسبيحة</span>
      </div>
    `;
    lb.appendChild(item);
  });

  // تحديث الترتيب
  const myRankEl = document.getElementById('myRankText');
  if (myRank) {
    myRankEl.textContent = rankLabel(myRank);
  } else {
    // اليوزر موجود بس مش في الـ top 20 أو عدده صفر
    myRankEl.textContent = myCount > 0 ? 'خارج الـ Top 20' : 'ترتيبك: —';
  }
}

function startLbAutoRefresh() {
  clearInterval(lbRefreshTimer);
  lbRefreshTimer = setInterval(loadLeaderboard, 30000);
}

// ── Real-time ──
function subscribeRealtime() {
  // إزالة الـ channel القديم لو موجود
  if (realtimeChannel) {
    db.removeChannel(realtimeChannel);
  }

  realtimeChannel = db.channel('tasbih_realtime')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'tasbih_scores',
      filter: `dhikr=eq.${currentDhikr}` // ✅ بنسمع بس للذكر الحالي
    }, () => {
      loadLeaderboard();
    })
    .subscribe();
}

// ── Settings Modal ──
document.getElementById('settingsBtn').onclick = () =>
  document.getElementById('settingsModal').classList.add('open');

document.getElementById('closeModalBtn').onclick = () =>
  document.getElementById('settingsModal').classList.remove('open');

document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

document.getElementById('saveNameBtn').onclick = async () => {
  const name = document.getElementById('displayNameInput').value.trim();
  if (!name) return showToast('⚠️ ادخل اسماً');
  if (!currentUser) return;

  const { error } = await db
    .from('profiles')
    .update({ display_name: name })
    .eq('id', currentUser.id);

  if (!error) {
    currentProfile.display_name = name;
    document.getElementById('myName').textContent = name;
    document.getElementById('settingsModal').classList.remove('open');
    showToast('✓ تم حفظ الاسم');
    await loadLeaderboard();
  } else {
    showToast('حدث خطأ: ' + error.message);
  }
};

document.getElementById('signOutBtn').onclick = async () => {
  if (confirm('هل تريد تسجيل الخروج؟')) {
    if (saveDebounce) { clearTimeout(saveDebounce); await saveScore(); }
    await db.auth.signOut();
  }
};

// ── Start ──
init();
</script>
