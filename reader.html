<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف — القرآن الكريم</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1008">
<link rel="icon" href="images/logo.webp" type="image/webp">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="reader.css">
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h2>المصحف الشريف</h2>
    <p>القرآن الكريم · ١١٤ سورة</p>
  </div>
  <div class="sidebar-progress">
    <div class="prog-arc-mini">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="17" fill="none" stroke="rgba(201,168,76,.12)" stroke-width="4"/>
        <circle cx="22" cy="22" r="17" fill="none" stroke="url(#sg)" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="107" stroke-dashoffset="107"
          transform="rotate(-90 22 22)" id="miniCircle" style="transition:stroke-dashoffset .5s ease"/>
        <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8cc7a"/><stop offset="100%" stop-color="#c9a84c"/>
        </linearGradient></defs>
      </svg>
    </div>
    <div class="sidebar-prog-text">
      <strong id="doneCountTxt">0</strong> / 114<br>سورة مكتملة
    </div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="ابحث عن سورة...">
  </div>
  <div class="surah-list" id="surahList"></div>
</div>

<div class="main" id="main">
  <div class="topbar">
    <a class="icon-btn" href="index.html" title="الرئيسية">🏠</a>
    <button class="icon-btn" id="toggleSidebar" title="قائمة السور">☰</button>
    <div class="topbar-title" id="topbarTitle">المصحف الشريف</div>
    <div class="topbar-info" id="topbarInfo"></div>
    
    <select class="reader-select" id="readerSelect">
      <option value="alafasy" data-full="https://server8.mp3quran.net/afs/">مشاري العفاسي</option>
      <option value="basit" data-full="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
      <option value="shuraym" data-full="https://server7.mp3quran.net/shur/">سعود الشريم</option>
      <option value="husary" data-full="https://server13.mp3quran.net/husr/">محمود خليل الحصري</option>
      <option value="minshawi" data-full="https://server10.mp3quran.net/minsh/">محمد صديق المنشاوي</option>
    </select>
  </div>
  
  <div class="quran-display">
    <div id="quranContent">
      <div class="loading">
        <p>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
        <div class="loading-dots">
          <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="resume-toast" id="resumeToast">
  <div class="resume-toast-text">
    <span id="toastMsg">متابعة التلاوة</span>
    <small id="toastSub"></small>
  </div>
  <button class="toast-btn" id="toastResume">استكمال ▶</button>
  <button class="toast-dismiss" id="toastDismiss">✕</button>
</div>

<div class="player" id="player">
  <div class="surah-progress-wrap">
    <div class="surah-prog-top">
      <span class="surah-prog-label" id="progLabel">—</span>
      <div class="surah-prog-time">
        <span id="timeElapsed">00:00</span>
        <span style="color:rgba(253,246,227,.2); margin: 0 4px;">/</span>
        <span id="timeDuration">00:00</span>
      </div>
    </div>
    <div class="prog-track" id="progTrack">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>
  <div class="player-controls">
    <div class="player-info">
      <div class="player-verse-badge" id="playerVerseBadge">
        <span class="verse-dot" id="verseDot"></span>
        <span id="playerVerseInfo"></span>
      </div>
    </div>
    <button class="ctrl-btn" id="nextBtn">⏭</button>
    <button class="ctrl-btn play-btn" id="playBtn">▶</button>
    <button class="ctrl-btn" id="prevBtn">⏮</button>
    <div class="volume-wrap">
      <span class="volume-icon" id="muteBtn">🔊</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1">
    </div>
    <div class="auto-toggle on" id="autoToggle">
      <span class="adot"></span><span>تلاوة متواصلة</span>
    </div>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>
<audio id="metaAudio" preload="metadata"></audio>

<script src="reader.js">

</script>
</body>
</html>
