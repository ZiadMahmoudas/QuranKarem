<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف — القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8cc7a;
  --gold-dark: #8b6914;
  --cream: #fdf6e3;
  --brown: #1c1008;
  --brown2: #2e1e10;
  --brown3: #3d2b1f;
  --green: #2d6a4f;
  --green-light: #52b788;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Amiri', serif;
  background: var(--brown);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ════════════════════════
   SIDEBAR
════════════════════════ */
.sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 270px;
  height: 100vh;
  background: linear-gradient(180deg, #120a03 0%, #1e1108 100%);
  border-left: 1px solid rgba(201,168,76,0.18);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
}
.sidebar.hidden { transform: translateX(100%); }

.sidebar-logo {
  padding: 22px 18px 16px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
  text-align: center;
}
.sidebar-logo h2 {
  font-family: 'Scheherazade New', serif;
  color: var(--gold-light);
  font-size: 1.25rem;
  line-height: 1.3;
}
.sidebar-logo p {
  color: rgba(253,246,227,0.3);
  font-size: 0.72rem;
  margin-top: 3px;
}

/* Search */
.sidebar-search {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(201,168,76,0.08);
}
.sidebar-search input {
  width: 100%;
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.18);
  color: var(--cream);
  padding: 8px 12px;
  border-radius: 8px;
  font-family: 'Amiri', serif;
  font-size: 0.95rem;
  outline: none;
  text-align: right;
  transition: border-color 0.2s;
}
.sidebar-search input::placeholder { color: rgba(253,246,227,0.28); }
.sidebar-search input:focus { border-color: var(--gold); }

.surah-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dark) transparent;
}
.surah-list::-webkit-scrollbar { width: 3px; }
.surah-list::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

.surah-item {
  display: flex;
  align-items: center;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.18s;
  gap: 10px;
  border-right: 3px solid transparent;
}
.surah-item:hover { background: rgba(201,168,76,0.07); }
.surah-item.active {
  background: rgba(201,168,76,0.13);
  border-right-color: var(--gold);
}

.s-num {
  font-size: 0.75rem;
  color: var(--gold-dark);
  min-width: 26px;
  text-align: center;
  font-family: 'Scheherazade New', serif;
}
.s-name {
  font-family: 'Scheherazade New', serif;
  font-size: 1.05rem;
  color: var(--cream);
  flex: 1;
}
.s-meta {
  font-size: 0.68rem;
  color: rgba(253,246,227,0.28);
  text-align: left;
  direction: ltr;
  line-height: 1.5;
}

/* ════════════════════════
   MAIN
════════════════════════ */
.main {
  margin-right: 270px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: margin-right 0.38s;
}
.main.full { margin-right: 0; }

/* ── TOP BAR ── */
.topbar {
  position: sticky;
  top: 0; z-index: 40;
  background: rgba(20,11,4,0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(201,168,76,0.13);
  padding: 10px 22px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon-btn {
  background: rgba(201,168,76,0.09);
  border: 1px solid rgba(201,168,76,0.22);
  color: var(--gold);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  text-decoration: none;
}
.icon-btn:hover { background: rgba(201,168,76,0.18); }

.topbar-title {
  font-family: 'Scheherazade New', serif;
  font-size: 1.35rem;
  color: var(--gold-light);
  flex: 1;
}

.topbar-info {
  font-size: 0.8rem;
  color: rgba(253,246,227,0.35);
  direction: ltr;
  text-align: left;
}

.reader-select {
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.22);
  color: var(--cream);
  padding: 6px 10px;
  border-radius: 8px;
  font-family: 'Amiri', serif;
  font-size: 0.88rem;
  cursor: pointer;
  outline: none;
  max-width: 160px;
}
.reader-select option { background: #1a0f07; }

/* ── QURAN DISPLAY ── */
.quran-display {
  flex: 1;
  padding: 44px 64px 220px;
  max-width: 880px;
  margin: 0 auto;
  width: 100%;
}

/* Surah header */
.surah-header {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeIn 0.55s ease;
}

.surah-crown {
  font-size: 2rem;
  color: rgba(201,168,76,0.35);
  letter-spacing: 16px;
  display: block;
  margin-bottom: 10px;
}

.surah-header-name {
  font-family: 'Scheherazade New', serif;
  font-size: clamp(2.2rem, 4.5vw, 3.4rem);
  color: var(--gold-light);
  text-shadow: 0 3px 24px rgba(201,168,76,0.35);
  display: block;
}

.surah-header-pills {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 10px;
  flex-wrap: wrap;
}

.pill {
  font-size: 0.78rem;
  color: rgba(253,246,227,0.45);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 3px 12px;
}

.basmala {
  text-align: center;
  font-family: 'Scheherazade New', serif;
  font-size: clamp(1.6rem, 3.2vw, 2.3rem);
  color: var(--gold);
  margin: 24px 0 40px;
  display: block;
  text-shadow: 0 2px 16px rgba(201,168,76,0.25);
}

/* Verses */
.verses-container {
  line-height: 2.8;
  text-align: justify;
  font-size: clamp(1.35rem, 2.3vw, 1.75rem);
  font-family: 'Scheherazade New', serif;
  color: var(--cream);
  word-spacing: 5px;
}

.verse {
  display: inline;
  padding: 0 3px;
  border-radius: 5px;
  transition: background 0.22s, color 0.22s;
}

.verse.active-verse {
  background: rgba(201,168,76,0.2);
  color: var(--gold-light);
  box-shadow: 0 0 0 2px rgba(201,168,76,0.28);
  border-radius: 6px;
}

.verse-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.85em; height: 1.85em;
  margin: 0 5px;
  font-size: 0.6em;
  color: var(--gold-dark);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  font-family: 'Amiri', serif;
  vertical-align: middle;
  transition: all 0.18s;
}

.verse.active-verse .verse-num {
  color: var(--gold-light);
  border-color: rgba(201,168,76,0.6);
  background: rgba(201,168,76,0.15);
}

/* Loading */
.loading {
  text-align: center;
  padding: 100px 20px;
}
.loading p {
  font-family: 'Scheherazade New', serif;
  color: var(--gold);
  font-size: 1.35rem;
  margin-bottom: 24px;
  animation: pulse 2s infinite;
}
.loading-dots { display: flex; justify-content: center; gap: 8px; }
.loading-dot {
  width: 9px; height: 9px;
  background: var(--gold);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.18s; }
.loading-dot:nth-child(3) { animation-delay: 0.36s; }

/* ════════════════════════
   PLAYER
════════════════════════ */
.player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(10,5,1,0.99) 0%, rgba(18,9,3,0.96) 100%);
  backdrop-filter: blur(14px);
  border-top: 1px solid rgba(201,168,76,0.18);
  z-index: 60;
  transition: transform 0.3s;
}
.player.hidden { transform: translateY(100%); }

/* SURAH progress (full bar) */
.surah-progress-wrap {
  padding: 12px 28px 0;
}
.surah-prog-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.surah-prog-label {
  font-family: 'Scheherazade New', serif;
  font-size: 1rem;
  color: var(--gold-light);
}
.surah-prog-time {
  font-size: 0.72rem;
  color: rgba(253,246,227,0.35);
  direction: ltr;
  display: flex;
  gap: 6px;
}

.prog-track {
  height: 5px;
  background: rgba(201,168,76,0.12);
  border-radius: 5px;
  cursor: pointer;
  position: relative;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  border-radius: 5px;
  width: 0%;
  transition: width 0.25s linear;
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute;
  right: -5px; top: 50%;
  transform: translateY(-50%);
  width: 11px; height: 11px;
  background: var(--gold-light);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(201,168,76,0.5);
  opacity: 0;
  transition: opacity 0.2s;
}
.prog-track:hover .prog-fill::after { opacity: 1; }

/* Controls row */
.player-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 28px 16px;
}

.player-info { flex: 1; min-width: 0; }
.player-surah-name {
  font-family: 'Scheherazade New', serif;
  font-size: 1.05rem;
  color: var(--gold-light);
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-verse-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 3px;
  font-size: 0.75rem;
  color: rgba(253,246,227,0.35);
}
.verse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green-light);
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.ctrl-btn {
  background: none;
  border: none;
  color: rgba(253,246,227,0.5);
  font-size: 1.25rem;
  cursor: pointer;
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ctrl-btn:hover { color: var(--gold-light); background: rgba(201,168,76,0.1); }

.play-btn {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold)) !important;
  color: var(--brown) !important;
  width: 52px !important; height: 52px !important;
  font-size: 1.4rem !important;
  box-shadow: 0 4px 24px rgba(201,168,76,0.28);
}
.play-btn:hover { opacity: 0.85; }

.volume-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.volume-icon { font-size: 1rem; color: rgba(253,246,227,0.3); cursor: pointer; }
.vol-slider {
  -webkit-appearance: none;
  width: 75px; height: 3px;
  background: rgba(201,168,76,0.18);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  background: var(--gold);
  border-radius: 50%;
}

.auto-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(201,168,76,0.18);
  background: rgba(201,168,76,0.04);
  transition: all 0.2s;
  font-size: 0.78rem;
  color: rgba(253,246,227,0.4);
  user-select: none;
  flex-shrink: 0;
}
.auto-toggle.on {
  border-color: var(--green-light);
  color: var(--green-light);
  background: rgba(82,183,136,0.07);
}
.auto-toggle .adot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
}

/* ════════════════════════
   ANIMATIONS
════════════════════════ */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
@keyframes bounce {
  0%,100%{transform:translateY(0);opacity:0.35}
  50%{transform:translateY(-11px);opacity:1}
}

/* ════════════════════════
   RESPONSIVE
════════════════════════ */
@media (max-width: 820px) {
  .sidebar { width: 240px; transform: translateX(100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-right: 0 !important; }
  .quran-display { padding: 30px 20px 220px; }
  .volume-wrap { display: none; }
  .auto-toggle span:last-child { display: none; }
  .topbar-info { display: none; }
}
</style>
</head>

<!-- ═══════ SIDEBAR ═══════ -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h2>المصحف الشريف</h2>
    <p>القرآن الكريم · ١١٤ سورة</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="ابحث عن سورة...">
  </div>
  <div class="surah-list" id="surahList"></div>
</div>

<!-- ═══════ MAIN ═══════ -->
<div class="main" id="main">

  <div class="topbar">
    <a class="icon-btn" href="index.html" title="الرئيسية">🏠</a>
    <button class="icon-btn" id="toggleSidebar" title="قائمة السور">☰</button>
    <div class="topbar-title" id="topbarTitle">المصحف الشريف</div>

      <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط عبد الصمد</option>
      <option value="Saud_Al-Shuraim_128kbps">سعود الشريم</option>
      <option value="Husary_128kbps">محمود خليل الحصري</option>
      <option value="Minshawy_Murattal_128kbps">محمد صديق المنشاوي</option>
    </select>
  </div>

  <div class="quran-display">
    <div id="quranContent">
      <div class="loading">
        <p>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>

</div>

<!-- ═══════ PLAYER ═══════ -->
<div class="player" id="player">

      </div>
    </div>
    <div class="prog-track" id="progTrack">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>

  <div class="player-controls">
    <div class="player-info">
      <span class="player-surah-name" id="playerSurahName">اختر سورة للبدء</span>
      <div class="player-verse-badge" id="playerVerseBadge" style="display:none">
        <span class="verse-dot" id="verseDot"></span>
        <span id="playerVerseInfo"></span>
      </div>
    </div>

    <button class="ctrl-btn" id="prevBtn" title="السورة السابقة">⏮</button>
    <button class="ctrl-btn play-btn" id="playBtn">▶</button>
    <button class="ctrl-btn" id="nextBtn" title="السورة التالية">⏭</button>

    <div class="volume-wrap">
      <span class="volume-icon" id="muteBtn">🔊</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1">
    </div>

    <div class="auto-toggle on" id="autoToggle">
      <span class="adot"></span>
      <span>تلاوة متواصلة</span>
    </div>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentSurah = 1;
let verses = [];          // [{text, numberInSurah, timings?}]
let verseTimings = [];    // [{startTime, endTime, verseIdx}]
let isPlaying = false;
let autoNext = true;
let muted = false;
let activeVerseIdx = -1;

const audio = document.getElementById('audioEl');

// ══════════════════════════════════════════
//  SIDEBAR BUILD + SEARCH
// ══════════════════════════════════════════
function buildSidebar(filter = '') {
  const list = document.getElementById('surahList');
  list.innerHTML = '';
  const q = filter.trim();
  SURAHS.forEach(s => {
    if (q && !s.name.includes(q) && !String(s.n).includes(q)) return;
    const el = document.createElement('div');
    el.className = 'surah-item' + (s.n === currentSurah ? ' active' : '');
    el.id = 'si-' + s.n;
    el.innerHTML = `
      <span class="s-num">${s.n}</span>
      <span class="s-name">${s.name}</span>
      <span class="s-meta">${s.type}<br>${s.ayat} آية</span>
    `;
    el.onclick = () => {
      loadSurah(s.n, true);
      // close on mobile
      if (window.innerWidth <= 820) closeSidebar();
    };
    list.appendChild(el);
  });
}

function updateSidebarActive(n) {
  document.querySelectorAll('.surah-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si-' + n);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest', behavior:'smooth'}); }
}

document.getElementById('searchInput').oninput = (e) => buildSidebar(e.target.value);

// ══════════════════════════════════════════
//  LOAD SURAH
// ══════════════════════════════════════════
async function loadSurah(n, autoplay = false) {
  currentSurah = n;
  activeVerseIdx = -1;
  verses = [];
  verseTimings = [];
  updateSidebarActive(n);

  const s = SURAHS[n - 1];
  document.getElementById('topbarTitle').textContent = 'سورة ' + s.name;
  document.getElementById('topbarInfo').textContent = `${s.type} · ${s.ayat} آية · ص ${s.page}`;
  document.getElementById('playerSurahName').textContent = 'سورة ' + s.name;
  document.getElementById('progLabel').textContent = 'سورة ' + s.name;
  document.getElementById('playerVerseBadge').style.display = 'none';

  // Show loading
  document.getElementById('quranContent').innerHTML = `
    <div class="loading">
      <p>جاري التحميل...</p>
      <div class="loading-dots">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>`;

  try {
    // Fetch text + audio timing from alquran.cloud
    const [textRes, timingRes] = await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${n}/quran-uthmani`),
      fetch(`https://api.alquran.cloud/v1/surah/${n}/ar.alafasy`), // timing metadata included
    ]);
    const textData = await textRes.json();
    const timingData = await timingRes.json();

    verses = textData.data.ayahs;

    // Build timing map: numberInSurah → {start, end} (in seconds)
    // alquran.cloud provides audio.duration metadata only – real timing needs qurancdn
    // We'll derive approximate timings once audio metadata loads
    // Store timing ayahs if available
    if (timingData.data && timingData.data.ayahs) {
      timingData.data.ayahs.forEach((a, i) => {
        verseTimings.push({
          verseIdx: i,
          numberInSurah: a.numberInSurah,
          // Will be calculated proportionally from duration
        });
      });
    }

    renderSurah();

    // Load audio for full surah
    const folder = document.getElementById('readerSelect').value;
    const sStr = String(n).padStart(3,'0');
    // Full surah audio from everyayah
    audio.src = `https://everyayah.com/data/${folder}/${sStr}000.mp3`;
    audio.load();

    if (autoplay || isPlaying) {
      audio.play().catch(() => {});
      isPlaying = true;
      updatePlayBtn();
    }

  } catch(e) {
    document.getElementById('quranContent').innerHTML = `
      <div class="loading"><p>⚠️ تعذر التحميل، تحقق من الإنترنت</p></div>`;
  }
}

// ══════════════════════════════════════════
//  RENDER SURAH TEXT
// ══════════════════════════════════════════
function renderSurah() {
  const s = SURAHS[currentSurah - 1];
  let html = `
    <div class="surah-header">
      <span class="surah-crown">❧ ✦ ❧</span>
      <span class="surah-header-name">سورة ${s.name}</span>
      <div class="surah-header-pills">
        <span class="pill">${s.type}</span>
        <span class="pill">${s.ayat} آية</span>
        <span class="pill">صفحة ${s.page}</span>
      </div>
    </div>`;

  if (currentSurah !== 9) {
    html += `<span class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>`;
  }

  html += `<div class="verses-container" id="versesContainer">`;
  verses.forEach((v, i) => {
    html += `<span class="verse" id="v-${i}" data-idx="${i}" onclick="seekToVerse(${i})">${v.text}<span class="verse-num">${toAr(v.numberInSurah)}</span> </span>`;
  });
  html += `</div>`;

  document.getElementById('quranContent').innerHTML = html;
}

// ══════════════════════════════════════════
//  VERSE HIGHLIGHTING via time
// ══════════════════════════════════════════
function updateActiveVerse(currentTime, duration) {
  if (!verses.length || !duration) return;

  // Proportional distribution: each verse gets equal time slice
  const verseCount = verses.length;
  const sliceDuration = duration / verseCount;
  const idx = Math.min(Math.floor(currentTime / sliceDuration), verseCount - 1);

  if (idx === activeVerseIdx) return;
  activeVerseIdx = idx;

  // Highlight
  document.querySelectorAll('.verse').forEach(el => el.classList.remove('active-verse'));
  const el = document.getElementById('v-' + idx);
  if (el) {
    el.classList.add('active-verse');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Badge
  const badge = document.getElementById('playerVerseBadge');
  badge.style.display = 'inline-flex';
  document.getElementById('playerVerseInfo').textContent =
    `الآية ${idx + 1} من ${verses.length}`;
}

function seekToVerse(idx) {
  if (!audio.duration || !verses.length) return;
  const sliceDuration = audio.duration / verses.length;
  audio.currentTime = idx * sliceDuration;
  if (!isPlaying) {
    audio.play().catch(()=>{});
    isPlaying = true;
    updatePlayBtn();
  }
}

// ══════════════════════════════════════════
//  AUDIO EVENTS
// ══════════════════════════════════════════
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = fmt(audio.currentTime);
  document.getElementById('timeDuration').textContent = fmt(audio.duration);
  updateActiveVerse(audio.currentTime, audio.duration);
});

audio.addEventListener('ended', () => {
  isPlaying = false;
  updatePlayBtn();
  activeVerseIdx = -1;
  document.querySelectorAll('.verse').forEach(el => el.classList.remove('active-verse'));

  if (autoNext && currentSurah < 114) {
    setTimeout(() => loadSurah(currentSurah + 1, true), 800);
  }
});

audio.addEventListener('play',  () => { isPlaying = true;  updatePlayBtn(); });
audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); });

audio.addEventListener('error', () => {
  // If full-surah file fails, try verse-by-verse fallback silently
  console.warn('Full surah audio not available');
});

// Progress bar click to seek
document.getElementById('progTrack').addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

// ══════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════
document.getElementById('playBtn').onclick = () => {
  if (!verses.length) { loadSurah(1, true); return; }
  isPlaying ? audio.pause() : audio.play().catch(()=>{});
};

document.getElementById('prevBtn').onclick = () => {
  if (currentSurah > 1) loadSurah(currentSurah - 1, isPlaying);
};

document.getElementById('nextBtn').onclick = () => {
  if (currentSurah < 114) loadSurah(currentSurah + 1, isPlaying);
};

document.getElementById('volSlider').oninput = (e) => {
  audio.volume = e.target.value;
  muted = audio.volume === 0;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
};

document.getElementById('muteBtn').onclick = () => {
  muted = !muted;
  audio.muted = muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
};

document.getElementById('autoToggle').onclick = () => {
  autoNext = !autoNext;
  document.getElementById('autoToggle').classList.toggle('on', autoNext);
};

document.getElementById('readerSelect').onchange = () => {
  const wasPlaying = isPlaying;
  loadSurah(currentSurah, wasPlaying);
};

// ── Sidebar toggle ──
let sidebarOpen = true;

function closeSidebar() {
  sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('main').classList.add('full');
}

document.getElementById('toggleSidebar').onclick = () => {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  const mn = document.getElementById('main');
  if (window.innerWidth <= 820) {
    sb.classList.toggle('open', sidebarOpen);
  } else {
    sb.classList.toggle('hidden', !sidebarOpen);
    mn.classList.toggle('full', !sidebarOpen);
  }
};

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function updatePlayBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('verseDot').style.animationPlayState = isPlaying ? 'running' : 'paused';
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2,'0');
}

function toAr(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
buildSidebar();
loadSurah(1, false);
</script>
